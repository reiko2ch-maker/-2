<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宵鳴り旅館</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="crt-frame">
      <canvas id="viewport" width="180" height="320" aria-label="ゲーム画面"></canvas>
      <div id="vhs-overlay"></div>
      <div id="hud-top">
        <div id="day-label">Day 1</div>
        <div id="phase-label">準備中</div>
      </div>
      <div id="hud-sub">
        <div id="objective-label">目的: まだありません</div>
        <div id="turn-label"></div>
      </div>
    </div>

    <div id="panel">
      <div id="title-bar">
        <div class="title-main">宵鳴り旅館</div>
        <div class="title-sub">YOINARI RYOKAN</div>
      </div>

      <div id="stats"></div>
      <div id="text-box"></div>
      <div id="choice-box"></div>

      <div id="controls" class="hidden">
        <div class="controls-row">
          <button data-action="turnLeft">↺ 左</button>
          <button data-action="forward">前進</button>
          <button data-action="turnRight">右 ↻</button>
        </div>
        <div class="controls-row">
          <button data-action="inspect">調べる</button>
          <button data-action="back">後退</button>
          <button data-action="menu">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
