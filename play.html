<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <title>宵宿 PLAY v17 3D Story Test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="play-body">
  <canvas id="gameCanvas"></canvas>

  <div id="hud" class="hud-wrap">
    <div class="hud-row left">
      <div id="dayLabel" class="hud-chip">DAY 1</div>
      <div id="phaseLabel" class="hud-chip accent">昼勤務</div>
      <div id="areaLabel" class="hud-chip subtle">帳場</div>
    </div>

    <div class="hud-row center hud-block" id="miniMapWrap">
      <div class="map-frame">
        <div class="map-title">館内導線</div>
        <canvas id="miniMap" width="320" height="120"></canvas>
      </div>
    </div>

    <div class="hud-row right stack">
      <button id="menuBtn" class="mini-btn" type="button">MENU</button>
      <div id="distanceBox" class="distance-box">目標 0m</div>
    </div>

    <div id="objectiveBox" class="objective-box">読み込み中...</div>
    <div id="promptBox" class="prompt-box hidden">E / ACT で調べる</div>
    <div id="statusBox" class="status-box">起動中...</div>

    <div id="dialogueBox" class="dialogue-box hidden">
      <div class="dialogue-layout">
        <canvas id="portraitCanvas" class="portrait-canvas" width="180" height="220"></canvas>
        <div class="dialogue-main">
          <div id="speakerLabel" class="speaker-label">記録</div>
          <div id="dialogueText" class="dialogue-text">……</div>
          <div class="dialogue-help">タップ / E / ACT で進む</div>
        </div>
      </div>
    </div>

    <div id="menuPanel" class="menu-panel hidden">
      <div class="menu-title">メニュー</div>
      <div class="menu-grid">
        <button id="saveBtn" class="menu-btn" type="button">SAVE</button>
        <button id="loadBtn" class="menu-btn" type="button">LOAD</button>
        <button id="hudToggleBtn" class="menu-btn" type="button">HUD OFF</button>
        <a class="menu-btn link" href="index.html">TITLE</a>
      </div>
    </div>

    <div id="endingScreen" class="ending-screen hidden">
      <div class="ending-card">
        <div class="title-kicker">ENDING</div>
        <h2 id="endingTitle">記録の夜</h2>
        <p id="endingText">……</p>
        <div class="title-actions single">
          <a href="play.html" class="title-btn primary">はじめから</a>
          <a href="index.html" class="title-btn">タイトルへ戻る</a>
        </div>
      </div>
    </div>

    <div class="touch-ui landscape">
      <div class="move-wrap">
        <div class="stick-title">MOVE</div>
        <div id="movePad" class="stick-pad">
          <div id="moveKnob" class="stick-knob"></div>
        </div>
      </div>
      <div class="right-ui">
        <div class="look-hint">右半分ドラッグで視点</div>
        <button id="actBtn" class="act-btn" type="button">ACT</button>
      </div>
    </div>

      </div>

  <script>
    window.__YOINADO_CONTINUE__ = new URLSearchParams(location.search).get('continue') === '1';
  </script>
  <script src="game.js" defer></script>
</body>
</html>
