<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宵宿 - PS1風ローポリ旅館ホラー</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="overlay" class="overlay">
    <div class="hud top-left hidden">
      <div id="dayLabel">DAY 1</div>
      <div id="phaseLabel">昼勤務</div>
    </div>

    <div class="hud top-right hidden">
      <button id="saveBtn" class="mini-btn">SAVE</button>
      <button id="loadBtn" class="mini-btn">LOAD</button>
      <button id="restartBtn" class="mini-btn danger">RESET</button>
    </div>

    <div id="crosshair" class="crosshair hidden">+</div>

    <div id="objective" class="objective hidden">女将に話しかける</div>
    <div id="prompt" class="prompt hidden">E / タップで調べる</div>

    <div id="dialogueBox" class="dialogue hidden">
      <div id="speaker" class="speaker">女将</div>
      <div id="dialogueText" class="dialogue-text"></div>
      <div class="dialogue-help">タップ / Enter / E で進む</div>
    </div>

    <div id="choiceBox" class="choice-box hidden"></div>

    <div id="titleScreen" class="title-screen">
      <div class="title-inner">
        <div class="eyebrow">PS1風ローポリ・一人称旅館ホラー / v2</div>
        <h1>宵宿</h1>
        <p>
          山奥の古い旅館で住み込み勤務を始めた。<br />
          昼は接客、夜は見回り。<br />
          ただし、二階の突き当たりだけは見ないこと。
        </p>
        <div class="controls">
          <div>PC: WASD / マウス / E</div>
          <div>スマホ: 左下で移動 / 右側スワイプで視点 / ACTで調べる</div>
        </div>
        <div class="title-actions"><button id="startBtn" type="button" class="primary-btn">最初から始める</button><button id="continueBtn" type="button" class="primary-btn secondary-btn hidden">続きから</button></div><div class="tap-help">ボタンが反応しない場合は、このパネルの中央をタップしてください。</div>
      </div>
    </div>

    <div id="endingScreen" class="ending-screen hidden">
      <div class="title-inner ending-inner">
        <div class="eyebrow">ENDING</div>
        <h2 id="endingTitle">END</h2>
        <p id="endingText"></p>
        <button id="endingRestartBtn" class="primary-btn">最初から</button>
      </div>
    </div>

    <div id="fade" class="fade hidden"></div>

    <div id="touchControls" class="touch-controls hidden">
      <div id="movePad" class="move-pad">
        <div id="moveStick" class="move-stick"></div>
      </div>
      <div class="touch-actions">
        <button id="actBtn" class="action-btn">ACT</button>
      </div>
    </div>

    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
